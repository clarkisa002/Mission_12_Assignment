name: Deploy Backend to Azure Web App

on:
  push:
    branches:
      - phase-6
    paths:
      - "backend/**"
      - ".github/workflows/deploy-backend.yml"
  pull_request:
    branches:
      - phase-6
    paths:
      - "backend/**"

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    name: Build and Deploy Backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore dependencies
        run: dotnet restore backend/BookstoreApi/BookstoreApi.csproj

      - name: Publish
        run: |
          dotnet publish backend/BookstoreApi/BookstoreApi.csproj \
            -c Release \
            -o ${{ github.workspace }}/publish

      - name: Copy SQLite database to publish output
        run: cp Bookstore.sqlite ${{ github.workspace }}/publish/

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.AZURE_BACKEND_APP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ${{ github.workspace }}/publish
